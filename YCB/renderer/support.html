<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Support – YCB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #202124; color: #e8eaed;
      font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 14px; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .card {
      text-align: center; padding: 40px 48px;
      background: #292a2d; border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px; max-width: 420px; width: 90%;
    }
    .icon { font-size: 52px; margin-bottom: 18px; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 10px; }
    p  { color: #9aa0a6; font-size: 14px; line-height: 1.65; margin-bottom: 28px; }
    .buttons { display: flex; flex-direction: column; gap: 12px; }
    a.btn {
      display: block; text-decoration: none;
      border-radius: 10px; padding: 13px 28px;
      font-size: 15px; font-weight: 600;
      transition: opacity 0.15s;
    }
    a.btn:hover { opacity: 0.85; }
    a.btn-discord { background: #5865F2; color: #fff; }
    a.btn-ticket  { background: #2a2b36; color: #e8eaed; border: 1px solid #3d3e4a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛠️</div>
    <h1>Need help?</h1>
    <p>Join our Discord server for support and updates, or open a ticket and our team will get back to you.</p>
    <div class="buttons">
      <a class="btn btn-discord" href="https://discord.gg/aAdbexZVVN" target="_blank">Join our Discord Server</a>
      <a class="btn btn-ticket"  href="https://discord.gg/aAdbexZVVN" target="_blank">Open a Ticket</a>
    </div>
  </div>
</body>
</html>
